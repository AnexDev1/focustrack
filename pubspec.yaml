name: focustrack
description: "A cross-platform screen time tracker for desktop & mobile."
publish_to: 'none'
version: 1.1.1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  flutter_riverpod: ^2.5.1
  fl_chart: ^0.68.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0
  win32: ^5.0.0
  ffi: ^2.1.0
  permission_handler: ^11.3.0
  installed_apps: ^1.5.0
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.2.3
  home_widget: ^0.9.0
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  http: ^1.2.0
  iconsax: ^0.0.8
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.11.0

flutter_icons:
  android: true
  ios: false
  image_path: "assets/target.png"
  windows:
    generate: true
    image_path: "assets/target.png"
  linux:
    generate: true
    image_path: "assets/target.png"

flutter:
  uses-material-design: true
  assets:
    - assets/target.png

